server {
    listen 80;
    listen [::]:80;

    server_name www.avancemosporchile.cl web.avancemosporchile.cl;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server using existing certificates
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name www.avancemosporchile.cl web.avancemosporchile.cl;

    ssl_certificate /etc/letsencrypt/live/www.avancemosporchile.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.avancemosporchile.cl/privkey.pem;
    ssl_certificate /etc/letsencrypt/live/web.avancemosporchile.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/web.avancemosporchile.cl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Increase buffers for large uploads if needed
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:5107;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
    }

    # Health check endpoint
    location = /healthz {
        access_log off;
        return 200 'ok';
    }
}
